<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ghst</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="root">
      <div class="pod" data-state="idle">
        <div class="pod__grain" aria-hidden="true"></div>
        <div class="pod__edge" aria-hidden="true"></div>

        <div class="sig" role="button" id="toggle" aria-label="Toggle listening">
          <div class="sig__ring"></div>
          <div class="eq" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="brand" aria-hidden="true">
          <span class="brand__mark">ghst</span>
          <span class="brand__dot"></span>
          <span class="brand__status" id="statusLabel">idle</span>
        </div>

        <div class="keys" role="group" aria-label="Shortcuts">
          <button class="key" data-act="toggle-listen" title="Start / stop listening">
            <span class="key__combo"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>␣</kbd></span>
            <span class="key__label">listen</span>
          </button>
          <button class="key" data-act="ask" title="Ask copilot now">
            <span class="key__combo"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>↵</kbd></span>
            <span class="key__label">ask</span>
          </button>
          <button class="key" data-act="clear" title="Clear transcript">
            <span class="key__combo"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>C</kbd></span>
            <span class="key__label">clear</span>
          </button>
          <button class="key key--ghost" data-act="hide" title="Hide overlay">
            <span class="key__combo"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>L</kbd></span>
            <span class="key__label">hide</span>
          </button>
          <button class="key key--ghost" data-act="settings" title="Settings">
            <span class="key__combo"><kbd>⚙</kbd></span>
            <span class="key__label">settings</span>
          </button>
        </div>
      </div>

      <div class="settings" id="settings" hidden role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings__panel">
          <div class="settings__head">
            <span class="settings__title" id="settingsTitle">settings</span>
            <span class="settings__brand">ghst</span>
          </div>

          <div class="settings__grid">
            <div class="settings__col">
              <div class="settings__group">
                <div class="settings__lab">
                  <span id="settingsKeyLabel">Groq API key</span>
                  <span class="settings__hint-inline" id="settingsKeyHint">stored in OS keyring</span>
                </div>
                <div class="settings__field" id="settingsKeyField">
                  <input
                    class="settings__input"
                    id="settingsKey"
                    type="password"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="gsk_…"
                    aria-labelledby="settingsKeyLabel"
                  />
                  <span class="settings__field-status" id="settingsKeyStatus" aria-hidden="true"></span>
                  <button class="settings__field-act" id="settingsClear" type="button">remove</button>
                </div>
                <div class="settings__links">
                  Get one at <button type="button" class="settings__linkbtn" id="settingsKeyUrl">console.groq.com/keys</button>
                </div>
                <div class="settings__msg" id="settingsMsg" hidden></div>
              </div>

              <div class="settings__group">
                <div class="settings__lab">
                  <span id="settingsPersonaLabel">About you</span>
                  <span class="settings__hint-inline"><span id="settingsPersonaCount">0</span> / 4000</span>
                </div>
                <div class="settings__field settings__field--textarea">
                  <textarea
                    class="settings__input settings__textarea"
                    id="settingsPersona"
                    spellcheck="false"
                    maxlength="4000"
                    placeholder="Name, role, current company, key projects, strong opinions, anything you want the copilot to ground answers in. Plain prose works best."
                    aria-labelledby="settingsPersonaLabel"
                  ></textarea>
                </div>
              </div>

            </div>

            <div class="settings__col">
              <div class="settings__group">
                <div class="settings__lab"><span>Transcript capture</span></div>
                <label class="settings__switch" id="settingsTranscriptSwitch">
                  <input id="settingsTranscriptEnabled" type="checkbox" />
                  <span class="settings__switch-track" aria-hidden="true"></span>
                  <span class="settings__switch-label">Save <code>.txt</code> on stop</span>
                </label>
                <div class="settings__field" id="settingsTranscriptDirField">
                  <input
                    class="settings__input"
                    id="settingsTranscriptDir"
                    type="text"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="Transcript folder"
                  />
                  <button class="settings__field-act" id="settingsTranscriptBrowse" type="button">browse…</button>
                </div>
                <div class="settings__links">
                  <button type="button" class="settings__linkbtn" id="settingsTranscriptOpen">Open folder</button>
                  ·
                  <button type="button" class="settings__linkbtn" id="settingsTranscriptDefault">Reset to default</button>
                </div>
              </div>

              <div class="settings__group">
                <div class="settings__lab">
                  <span id="settingsTranscriptNLabel">Transcript context size</span>
                  <span class="settings__hint-inline">lines kept in context</span>
                </div>
                <div class="settings__field">
                  <input
                    class="settings__input"
                    id="settingsTranscriptN"
                    type="number"
                    min="10"
                    max="200"
                    step="5"
                    aria-labelledby="settingsTranscriptNLabel"
                  />
                </div>
              </div>

              <div class="settings__group">
                <div class="settings__lab"><span>Shortcuts</span></div>
                <ul class="settings__shortcuts">
                  <li>
                    <span>Toggle overlay</span>
                    <span class="settings__shortcuts-combo"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>L</kbd></span>
                  </li>
                  <li>
                    <span>Toggle listen</span>
                    <span class="settings__shortcuts-combo"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>␣</kbd></span>
                  </li>
                  <li>
                    <span>Clear</span>
                    <span class="settings__shortcuts-combo"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>C</kbd></span>
                  </li>
                  <li>
                    <span>Trigger copilot</span>
                    <span class="settings__shortcuts-combo"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>⏎</kbd></span>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <div class="settings__foot">
            <button class="settings__btn settings__btn--ghost" id="settingsCancel" type="button">Close</button>
            <button class="settings__btn settings__btn--primary" id="settingsSave" type="button">Save</button>
          </div>
        </div>
      </div>

      <div class="ribbon" id="ribbon" role="log" aria-live="polite" hidden>
        <span class="ribbon__committed" id="liveCommitted"></span>
        <span class="ribbon__tentative" id="liveTentative"></span>
      </div>

      <div id="selfLine" class="self-line" hidden></div>

      <div class="stage" id="stage">
        <div class="prep" id="prep" data-mode="meeting">
          <header class="prep__head">
            <div class="prep__seg" id="prepSeg" role="radiogroup" aria-label="Mode">
              <button type="button" class="prep__seg-btn" id="prepModeMeeting" data-mode="meeting" role="radio" aria-checked="true">Meeting</button>
              <button type="button" class="prep__seg-btn" id="prepModeInterview" data-mode="interview" role="radio" aria-checked="false">Interview</button>
            </div>
            <div class="prep__hint" id="prepHint">
              Press <kbd>⌃</kbd><kbd>⇧</kbd><kbd>␣</kbd> to listen
            </div>
          </header>

          <div class="prep__interview" id="prepInterview" hidden>
            <div class="prep__row">
              <label class="prep__field">
                <span class="prep__label">Role</span>
                <input class="prep__input" id="prepRole" type="text" autocomplete="off" spellcheck="false" maxlength="4000" placeholder="e.g. Senior backend engineer" />
              </label>
              <label class="prep__field">
                <span class="prep__label">Company</span>
                <input class="prep__input" id="prepCompany" type="text" autocomplete="off" spellcheck="false" maxlength="4000" placeholder="e.g. Stripe — payments infra" />
              </label>
            </div>
            <label class="prep__field">
              <span class="prep__label">Job description</span>
              <textarea class="prep__textarea prep__textarea--lg" id="prepJD" spellcheck="false" maxlength="4000" rows="5" placeholder="Paste the JD verbatim. The copilot will weight examples toward what it emphasizes."></textarea>
            </label>
          </div>

          <label class="prep__field prep__field--notes">
            <span class="prep__label">Session notes</span>
            <textarea class="prep__textarea" id="prepNotes" spellcheck="false" maxlength="4000" rows="3" placeholder="Anything worth knowing — current round, who's in the room, what they care about."></textarea>
          </label>
        </div>
      </div>

      <div class="cards" id="cards" hidden>
        <div class="card__slot" id="slotPrev" data-slot="prev"></div>
        <div class="card__slot" id="slotCurrent" data-slot="current"></div>
      </div>

    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
